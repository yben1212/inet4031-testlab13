# Think of this file as giving Apache a set of forwarding rules.
# When a request comes in, Apache checks the path and decides where to send it.
# "app" is just the name we gave the Flask container in docker-compose.yml.
# Docker automatically handles the networking so Apache can reach it by name,
# the same way your browser finds a website by domain name instead of an IP address.

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    ProxyPreserveHost On

    # Forward /health to Flask
    ProxyPass        /health http://app:5000/health
    ProxyPassReverse /health http://app:5000/health

    # Forward /api/ to Flask
    ProxyPass        /api/ http://app:5000/api/
    ProxyPassReverse /api/ http://app:5000/api/

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
